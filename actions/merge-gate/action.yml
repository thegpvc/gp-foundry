name: "merge-gate"
description: >
  Evaluate a PR against a merge policy (bot-approval, CI, approval delay,
  hand-written diff size, protected paths, clean rebase) and either merge it,
  apply a routing label, or skip. Generalized port of the gp-dixie "Shipper".
author: "gp-foundry"

inputs:
  pr-number:
    description: >
      PR number to evaluate. When omitted, the action runs in POLLER mode:
      it discovers open candidate PRs and merges the first that qualifies.
    required: false
    default: ""
  token:
    description: >
      GitHub token with contents:write and pull-requests:write (a GitHub App
      installation token or a PAT so merges are attributed and events cascade).
    required: true
  policy-path:
    description: "Path to the merge policy file (YAML or JSON)."
    required: true
  base-branch:
    description: "Base branch to filter candidate PRs by (poller mode)."
    required: false
    default: "main"
  branch-prefix:
    description: >
      Only consider PRs whose head branch starts with this prefix (poller mode).
      Overrides the policy file's branchPrefix when set.
    required: false
    default: ""
  clean-rebase:
    description: >
      Optional override for the clean-rebase check: "true" or "false". When
      unset, the action infers it from the PR's mergeable state.
    required: false
    default: ""
  dry-run:
    description: "When 'true', evaluate and emit outputs but perform no mutation."
    required: false
    default: "false"

outputs:
  action:
    description: "Decision: merge | skip | label."
  code:
    description: "Machine-stable reason code (e.g. ready-to-merge, too-large)."
  reason:
    description: "Human-readable explanation of the decision."
  label:
    description: "Label to apply, when action is 'label'."
  merged:
    description: "'true' if a PR was merged by this run, else 'false'."
  merged-pr:
    description: "The PR number that was merged, if any."

runs:
  using: "node24"
  main: "dist/index.cjs"
