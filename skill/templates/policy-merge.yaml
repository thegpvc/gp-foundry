# policy/merge.yaml — the merge-gate's policy. Read by the runtime-core merge-gate
# action and evaluated into a {merge | skip | label} decision + audit comment.
#
# IMPORTANT: these are FLAT snake_case keys (normalized to camelCase at runtime).
# The action reads exactly these names — do not nest them under approval:/ci:/etc.

# Only consider PRs whose head branch starts with this prefix.
branch_prefix: "agent/"

# Approval — the Reviewer posts its verdict in a review BODY; count a body matching
# this regex as approval (a bot can't formally APPROVE its own PR).
approval_body_regex: "Verdict.*APPROVE"
approval_delay_minutes: 0        # cool-off after approval before auto-merge (0 = none)

# CI — require the check rollup to be passing; optionally ignore named checks.
require_ci: true
ci_ignore_check_names: []

# Size — hand-written additions cap; over this, label for a human instead of merging.
# exclude_globs discount generated files/lockfiles from the count.
max_additions: 800
exclude_globs:
  - "**/__pycache__/**"

# Protected paths — touching any of these blocks auto-merge (labels needs-human).
protected_paths:
  - ".github/"

# Rebase / conflicts.
#  - require_clean_rebase: false — GitHub's mergeable_state is computed async and races
#    on fresh PRs; instead we let the merge ATTEMPT fail and react (see rebase_label).
#  - rebase_label: applied when a merge attempt fails on a conflict; the 🧟 Janitor
#    (scheduled sweep) picks up this label, rebases, and de-labels.
require_clean_rebase: false
rebase_label: needs-rebase

# Merge — squash, NOT rebase: the Janitor resolves conflicts with a merge commit, and a
# rebase-merge cannot rebase a branch containing merge commits.
merge_method: squash
delete_branch_on_merge: true

# A PR already carrying one of these is skipped (the Janitor/human owns it, not the gate).
blocking_labels:
  - needs-human
  - needs-rebase

# Labels applied on a skip outcome, so skips route to the right owner.
labels:
  needs_human: needs-human       # too-large / protected-path
  rebase_needed: needs-rebase    # proactive rebase label (used if require_clean_rebase: true)
