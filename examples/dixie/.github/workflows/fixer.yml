# GENERATED FROM harness.dot — DO NOT EDIT.
# Edit harness.dot / roles / foundry.config.yaml and run `gp-foundry build`.
name: fixer
"on":
  pull_request_review:
    types:
      - submitted
concurrency:
  group: fixer-${{ github.event.pull_request.number }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  fixer:
    runs-on: ubuntu-latest
    if: contains(github.event.review.body, '**Verdict:** REQUEST_CHANGES')
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 30
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DIXIE_AGENT_APP_ID }}
          private-key: ${{ secrets.DIXIE_AGENT_APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Configure git identity
        shell: bash
        env:
          GIT_NAME: dixie-agent[bot]
          GIT_EMAIL: dixie-agent@users.noreply.github.com
        run: |-
          git config user.name "$GIT_NAME"
          git config user.email "$GIT_EMAIL"
      - name: Setup agent toolchain
        uses: ./.github/agent-setup
      - name: Fetch context
        id: ctx
        uses: thegpvc/gp-foundry/actions/agent-context@v1
        with:
          type: pr-review
          number: ${{ github.event.pull_request.number }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Run agent
        uses: thegpvc/gp-foundry/actions/run-agent@v1
        with:
          role-file: roles/fixer.md
          model: claude-opus-4-8
          scope-path: agents/scope.yaml
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github-token: ${{ steps.app-token.outputs.token }}
          context-file: ${{ steps.ctx.outputs.context-file }}
      - name: Commit and push fixes
        shell: bash
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |-
          # Commit anything the agent left uncommitted...
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "agent fix: fixer"
          fi
          # ...then push if HEAD is ahead of the remote (the agent may have committed itself).
          git fetch origin "$BRANCH" --quiet 2>/dev/null || true
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse "origin/$BRANCH" 2>/dev/null || echo none)" ]; then
            git push origin "HEAD:$BRANCH"
            echo "pushed fix to $BRANCH"
          else
            echo "no changes to push"
          fi
