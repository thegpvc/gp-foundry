# Edit harness.dot / roles / foundry.config.yaml and run `gp-foundry build`.
name: fixer
"on":
  pull_request_review:
    types:
      - submitted
concurrency:
  group: fixer-${{ github.event.pull_request.number }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  fixer:
    runs-on: ubuntu-latest
    if: github.event.review.state == 'changes_requested'
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 30
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DIXIE_AGENT_APP_ID }}
          private-key: ${{ secrets.DIXIE_AGENT_APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Setup agent toolchain
        uses: ./.github/agent-setup
      - name: Run agent
        uses: thegpvc/gp-foundry/actions/run-agent@v1
        with:
          role-file: roles/fixer.md
          model: claude-opus-4-8
          scope-path: agents/scope.yaml
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      - name: Commit and push fixes
        shell: bash
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |-
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "agent fix: fixer"
            git push origin "HEAD:$BRANCH"
          fi
