# Edit harness.dot / roles / foundry.config.yaml and run `gp-foundry build`.
name: critic
"on":
  pull_request:
    types:
      - opened
      - synchronize
concurrency:
  group: critic-${{ github.event.pull_request.number }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  critic:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 15
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.DIXIE_AGENT_APP_ID }}
          private-key: ${{ secrets.DIXIE_AGENT_APP_PRIVATE_KEY }}
      - name: Wait for ci.yml
        uses: thegpvc/gp-foundry/actions/wait-for-checks@v1
        with:
          sha: ${{ github.event.pull_request.head.sha }}
          workflow-name: ci.yml
          token: ${{ steps.app-token.outputs.token }}
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Setup agent toolchain
        uses: ./.github/agent-setup
      - name: Fetch context
        id: ctx
        uses: thegpvc/gp-foundry/actions/agent-context@v1
        with:
          type: pr-diff
          number: ${{ github.event.pull_request.number }}
          token: ${{ steps.app-token.outputs.token }}
      - name: Run agent
        uses: thegpvc/gp-foundry/actions/run-agent@v1
        with:
          role-file: roles/critic.md
          model: claude-opus-4-8
          scope-path: agents/scope.yaml
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github-token: ${{ steps.app-token.outputs.token }}
          context-file: ${{ steps.ctx.outputs.context-file }}
