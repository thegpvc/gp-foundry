# GENERATED FROM harness.dot — DO NOT EDIT.
# Edit harness.dot / roles / foundry.config.yaml and run `gp-foundry build`.
name: builder
"on":
  issues:
    types:
      - labeled
concurrency:
  group: builder-${{ github.event.issue.number }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  builder:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'build'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.AGENT_PAT }}
      - name: Configure git identity
        shell: bash
        env:
          GIT_NAME: Agent Bot
          GIT_EMAIL: agent-bot@users.noreply.github.com
        run: |-
          git config user.name "$GIT_NAME"
          git config user.email "$GIT_EMAIL"
      - name: Create branch
        id: branch
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          PREFIX: agent/
        run: |-
          SLUG=$(printf '%s' "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-' | cut -c1-50 | sed 's/-$//')
          BRANCH="$PREFIX$ISSUE_NUMBER-$SLUG"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
      - name: Setup agent toolchain
        uses: ./.github/agent-setup
      - name: Fetch context
        id: ctx
        uses: thegpvc/gp-foundry/actions/agent-context@v1
        with:
          type: issue
          number: ${{ github.event.issue.number }}
          token: ${{ secrets.AGENT_PAT }}
      - name: Run agent
        uses: thegpvc/gp-foundry/actions/run-agent@v1
        with:
          role-file: .github/agents/roles/builder.md
          model: claude-opus-4-8
          comms-file: .github/agents/communication.md
          scope-path: .github/agents/scope.yaml
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github-token: ${{ secrets.AGENT_PAT }}
          context-file: ${{ steps.ctx.outputs.context-file }}
      - name: "Fallback: commit / push / PR"
        if: ${{ !cancelled() }}
        uses: thegpvc/gp-foundry/actions/agent-fallback@v1
        with:
          branch: ${{ steps.branch.outputs.branch }}
          token: ${{ secrets.AGENT_PAT }}
          agent-name: builder
          base-branch: main
          issue-number: ${{ github.event.issue.number }}
          pr-title: ${{ github.event.issue.title }}
          pr-body: |-
            ### 🛠️ Auto-created (fallback)

            The agent finished but didn't open a PR itself, so one was created automatically. See the commits and the linked issue for context.

            Closes #${{ github.event.issue.number }}
