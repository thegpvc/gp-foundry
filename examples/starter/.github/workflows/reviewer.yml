# GENERATED FROM harness.dot — DO NOT EDIT.
# Edit harness.dot / roles / foundry.config.yaml and run `gp-foundry build`.
name: reviewer
"on":
  pull_request:
    types:
      - opened
      - synchronize
concurrency:
  group: reviewer-${{ github.event.pull_request.number }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  reviewer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.AGENT_PAT }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Setup agent toolchain
        uses: ./.github/agent-setup
      - name: Fetch context
        id: ctx
        uses: thegpvc/gp-foundry/actions/agent-context@v1
        with:
          type: pr-diff
          number: ${{ github.event.pull_request.number }}
          token: ${{ secrets.AGENT_PAT }}
      - name: Run agent
        uses: thegpvc/gp-foundry/actions/run-agent@v1
        with:
          role-file: .github/agents/roles/reviewer.md
          model: claude-opus-4-8
          comms-file: .github/agents/communication.md
          scope-path: .github/agents/scope.yaml
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github-token: ${{ secrets.AGENT_PAT }}
          context-file: ${{ steps.ctx.outputs.context-file }}
