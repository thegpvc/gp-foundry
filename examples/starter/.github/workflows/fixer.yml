# GENERATED FROM harness.dot — DO NOT EDIT.
# Edit harness.dot / roles / foundry.config.yaml and run `gp-foundry build`.
name: fixer
"on":
  pull_request_review:
    types:
      - submitted
concurrency:
  group: fixer-${{ github.event.pull_request.number }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  fixer:
    runs-on: ubuntu-latest
    if: contains(github.event.review.body, '**Verdict:** REQUEST_CHANGES')
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.AGENT_PAT }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Configure git identity
        shell: bash
        env:
          GIT_NAME: Agent Bot
          GIT_EMAIL: agent-bot@users.noreply.github.com
        run: |-
          git config user.name "$GIT_NAME"
          git config user.email "$GIT_EMAIL"
      - name: Enforce attempt budget (max 3)
        id: attempts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AGENT_PAT }}
          PR: ${{ github.event.pull_request.number }}
          MARKER: <!-- gp-foundry:attempt:fixer -->
          MAX: "3"
        run: |-
          COUNT=$(gh pr view "$PR" --json comments --jq '[.comments[].body | select(contains("'"$MARKER"'"))] | length')
          echo "attempts so far: $COUNT / $MAX"
          if [ "$COUNT" -ge "$MAX" ]; then
            gh pr edit "$PR" --add-label "needs-human" 2>/dev/null || gh api --method POST "repos/$GITHUB_REPOSITORY/issues/$PR/labels" -f 'labels[]=needs-human'
            gh pr comment "$PR" --body "$(printf '## ⛔ Attempt budget (fixer)\n\nExhausted (%s/%s) — labeling `needs-human` and stopping. A human should take this over.\n\n%s' "$COUNT" "$MAX" "$MARKER")"
            echo "exhausted=true" >> "$GITHUB_OUTPUT"
          else
            gh pr comment "$PR" --body "$(printf '%s attempt %s of %s' "$MARKER" "$((COUNT+1))" "$MAX")" >/dev/null
            echo "exhausted=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup agent toolchain
        if: steps.attempts.outputs.exhausted != 'true'
        uses: ./.github/agent-setup
      - name: Fetch context
        id: ctx
        if: steps.attempts.outputs.exhausted != 'true'
        uses: thegpvc/gp-foundry/actions/agent-context@v1
        with:
          type: pr-review
          number: ${{ github.event.pull_request.number }}
          token: ${{ secrets.AGENT_PAT }}
      - name: Run agent
        if: steps.attempts.outputs.exhausted != 'true'
        uses: thegpvc/gp-foundry/actions/run-agent@v1
        with:
          role-file: .github/agents/roles/fixer.md
          model: claude-opus-4-8
          comms-file: .github/agents/communication.md
          scope-path: .github/agents/scope.yaml
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github-token: ${{ secrets.AGENT_PAT }}
          context-file: ${{ steps.ctx.outputs.context-file }}
      - name: Commit and push fixes
        if: steps.attempts.outputs.exhausted != 'true' && !cancelled()
        shell: bash
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |-
          # Commit anything the agent left uncommitted...
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "agent fix: fixer"
          fi
          # ...then push if HEAD is ahead of the remote (the agent may have committed itself).
          git fetch origin "$BRANCH" --quiet 2>/dev/null || true
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse "origin/$BRANCH" 2>/dev/null || echo none)" ]; then
            git push origin "HEAD:$BRANCH"
            echo "pushed fix to $BRANCH"
          else
            echo "no changes to push"
          fi
