name: merge_gate
"on":
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}
concurrency:
  group: merge_gate
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  merge_gate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.AGENT_PAT }}
          fetch-depth: 0
      - name: Configure git identity
        shell: bash
        env:
          GIT_NAME: Agent Bot
          GIT_EMAIL: agent-bot@users.noreply.github.com
        run: |-
          git config user.name "$GIT_NAME"
          git config user.email "$GIT_EMAIL"
      - name: Evaluate merge gate
        uses: thegpvc/gp-foundry/actions/merge-gate@v1
        with:
          token: ${{ secrets.AGENT_PAT }}
          policy-path: .github/agents/policy/merge.yaml
          base-branch: main
          branch-prefix: agent/
